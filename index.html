<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XO ARCHIVE | Database</title>
<style>
:root{
  --bg-pure:#000000;
  --bg-card:#0a0a0a;
  --accent-red:#ff0000;
  --accent-red-dim:#4a0000;
  --accent-blue:#4aa3ff;
  --text-main:#ffffff;
  --text-dim:#666666;
  --border-dim:#1a1a1a;
  --font-sans: 'Inter', 'Helvetica Neue', sans-serif;
}
body{background-color: var(--bg-pure); color: var(--text-main); font-family: var(--font-sans); margin: 0; padding: 0; -webkit-font-smoothing: antialiased;}
.container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
.hero { text-align: center; padding: 50px 0; background: radial-gradient(circle at center, #1a0000 0%, #000 70%); border-radius: 20px; margin-bottom: 30px; border: 1px solid var(--border-dim); }
.hero h1 { font-size: 48px; font-weight: 800; letter-spacing: 12px; margin: 0; text-transform: uppercase; text-shadow: 0 0 20px rgba(255, 0, 0, 0.3); }
.live-status-bar { display: inline-flex; align-items: center; gap: 12px; background: rgba(255, 0, 0, 0.05); border: 1px solid var(--accent-red-dim); padding: 8px 24px; border-radius: 99px; margin-top: 20px; }
.live-dot { width: 8px; height: 8px; background: var(--accent-red); border-radius: 50%; box-shadow: 0 0 10px var(--accent-red); animation: pulse 2s infinite; }
@keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
.tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid var(--border-dim); padding-bottom: 15px; }
.tab-btn { background: transparent; border: 1px solid var(--border-dim); color: var(--text-dim); padding: 10px 25px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
.tab-btn.active { background: #111; color: var(--text-main); border-color: var(--accent-red-dim); }
.tab-panel { display: none; animation: fadeIn 0.4s ease; }
.tab-panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 40px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border-dim); padding: 20px; border-radius: 12px; text-align: center; }
.stat-val { font-size: 24px; font-weight: 700; display: block; }
.stat-lab { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-top: 5px; }
.filters { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; flex-wrap: wrap; }
.filter-btn { background: transparent; border: 1px solid var(--border-dim); color: var(--text-dim); padding: 6px 16px; border-radius: 5px; font-size: 12px; cursor: pointer; }
.filter-btn.active { background: white; color: black; border-color: white; }
.year-header { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--border-dim); padding-bottom: 10px; margin-bottom: 20px; }
.show-row { display: grid; grid-template-columns: 80px 1fr auto; align-items: center; padding: 15px; border-radius: 10px; margin-bottom: 4px; cursor: pointer; transition: 0.2s; }
.show-row:hover { background: #0f0f0f; transform: translateX(8px); }
.date-box { text-align: left; }
.d-day { font-size: 20px; font-weight: 700; }
.d-mon { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
.venue-info { font-size: 14px; font-weight: 500; }
.venue-sub { font-size: 11px; color: var(--text-dim); }
.region-label { font-size: 9px; padding: 2px 6px; border-radius: 3px; background: #222; color: #888; margin-right: 8px; }
.tag { font-size: 10px; padding: 4px 12px; border-radius: 4px; font-weight: 600; }
.tag-done { background: #111; color: #555; }
.tag-live { background: var(--accent-red); color: white; }
.tag-soon { background: #1a1505; color: #c5a059; }
.tag-upcoming { background: rgba(68, 163, 255, 0.1); color: var(--accent-blue); }
.outfit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
.outfit-photo-card { background: var(--bg-card); border: 1px solid var(--border-dim); border-radius: 8px; overflow: hidden; transition: 0.3s; }
.outfit-photo-card:hover { border-color: var(--accent-red-dim); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5);}
.outfit-photo-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
.photo-caption { padding: 15px; background: #050505; text-align: center; }
.photo-caption strong { font-size: 12px; display: block; color: #fff; margin-bottom: 4px;}
.photo-caption span { font-size: 9px; color: var(--text-dim); text-transform: uppercase; }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; }
.modal-overlay.active { display: flex; }
.modal-box { background: #050505; border: 1px solid #222; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; border-radius: 15px; padding: 30px; position: relative; }
.modal-close { position: absolute; top: 15px; right: 15px; background: #111; border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
.setlist-item { display: flex; gap: 15px; padding: 12px 0; border-bottom: 1px solid #1a1a1a; align-items: flex-start; }
.track-num { font-size: 11px; font-weight: bold; color: #555; min-width: 20px; text-align: right; }
.track-num.star { color: #c5a059; font-size: 14px;}
.track-title { font-size: 14px; color: #eee; font-weight: 500;}
.track-note { font-size: 11px; color: #888; font-style: italic; }
</style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>XO ARCHIVE</h1>
        <div class="live-status-bar"><div class="live-dot"></div><span style="font-size: 11px; letter-spacing: 2px; font-weight: 600; color: var(--text-dim);">LIVE TOUR MONITORING</span></div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('shows', this)">Concerts</button>
        <button class="tab-btn" onclick="switchTab('outfit', this)">Visual Evolution</button>
    </div>
    <div id="tab-shows" class="tab-panel active">
        <div class="stats-grid" id="stats"></div>
        <div class="filters">
            <button class="filter-btn active" onclick="filterShows('all',this)">All</button>
            <button class="filter-btn" onclick="filterShows('usa',this)">USA</button>
            <button class="filter-btn" onclick="filterShows('canada',this)">Canada</button>
            <button class="filter-btn" onclick="filterShows('latam',this)">Latam</button>
            <button class="filter-btn" onclick="filterShows('europe',this)">Europe</button>
        </div>
        <div id="shows-container"></div>
    </div>
    <div id="tab-outfit" class="tab-panel">
      <div class="outfit-grid">
        <div class="outfit-photo-card"><img src="https://i.postimg.cc/59KZNRht/IMG-8231.jpg"><div class="photo-caption"><strong>Latam 2023: Red Velvet</strong><span>Monterrey Opening</span></div></div>
        <div class="outfit-photo-card"><img src="https://i.postimg.cc/6q2bGHCM/IMG-8226.jpg"><div class="photo-caption"><strong>Leg 1: Classic Red</strong><span>North America 2022</span></div></div>
        <div class="outfit-photo-card"><img src="https://i.postimg.cc/PxPn2Qmz/IMG-8223.jpg"><div class="photo-caption"><strong>After Hours Suit</strong><span>Toronto Special</span></div></div>
        <div class="outfit-photo-card"><img src="https://i.postimg.cc/3Nm6cSWD/IMG-8229.jpg"><div class="photo-caption"><strong>Leg 2: Tactical Vest</strong><span>Europe & Latam 2023</span></div></div>
        <div class="outfit-photo-card"><img src="https://i.postimg.cc/8CxZgR2W/IMG-8228.jpg"><div class="photo-caption"><strong>Leg 3: Gold & Shadow</strong><span>2025 Era</span></div></div>
        <div class="outfit-photo-card"><img src="https://i.postimg.cc/zv4tw9NT/IMG-8162.jpg"><div class="photo-caption"><strong>Latam 2026: Camo Cyborg</strong><span>São Paulo / Rio Leg</span></div></div>
      </div>
      <div style="margin-top: 40px; text-align: center; border-top: 1px solid #1a1a1a; padding-top: 20px;"><p style="font-size: 11px; color: #444; letter-spacing: 1px; text-transform: uppercase;">Olivier</p></div>
    </div>
</div>
<div class="modal-overlay" id="setlist-modal" onclick="closeModal(event)">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal(event, true)">✕</button>
        <div style="text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #222;"><h3 id="m-city" style="margin: 0; letter-spacing: 1px; color: #fff;"></h3><p id="m-date" style="font-size: 11px; color: #666; margin-top: 5px; text-transform: uppercase;"></p></div>
        <div id="m-body"></div>
    </div>
</div>
<script>
const TODAY = new Date('2026-04-28');
const MON = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const sl_na22 = [['1','Alone Again',''],['2','Gasoline',''],['3','Sacrifice','SHM Remix'],['4','How Do I Make You Love Me?',''],['5',"Can't Feel My Face",''],['6','Take My Breath',''],['7','Hurricane','Ye cover'],['8','Crew Love',''],['9','Low Life',''],['10','Often',''],['11','The Hills',''],['12','Heartless',''],['13','Faith',''],['14','Starboy',''],['15','I Feel It Coming',''],['16','Kiss Land',''],['17','Die for You',''],['18','Call Out My Name',''],['19','After Hours',''],['20','Save Your Tears',''],['21','Blinding Lights','']];
const sl_sofi_fail = [['1','Alone Again','Show cancelled - Voice loss']];
const sl_latam23 = [['1','LA FAMA','Rosalía cover'],['2','Party Monster',''],['3','Take My Breath',''],['4','Sacrifice',''],['5','How Do I Make You Love Me?',''],['6',"Can't Feel My Face",''],['7','Lost in the Fire','w/ Gesaffelstein'],['8','Hurricane','Ye cover'],['9','The Hills',''],['10','Kiss Land',''],['11','Often',''],['12','Crew Love',''],['13','Starboy',''],['14','House of Balloons',''],['15','Heartless',''],['16','Low Life',''],['17','Reminder',''],['18','CIRCUS MAXIMUS','Travis Scott cover'],['19','Faith',''],['20','After Hours',''],['21','Earned It',''],['22','Out of Time',''],['23','I Feel It Coming',''],['24','Die for You',''],['25','Is There Someone Else?',''],['26','I Was Never There',''],['27','Wicked Games',''],['28','Call Out My Name',''],['29','The Morning',''],['30','Save Your Tears',''],['31','Less Than Zero',''],['32','Blinding Lights',''],['33','Tears in the Rain',''],['34',"Creepin'",''],['35','Popular',''],['36','In Your Eyes',''],['37','Moth to a Flame','']];
const sl_latam26 = [['1','Baptized in Fear',''],['2','Open Hearts',''],['3','Wake Me Up',''],['4','After Hours',''],['5','Starboy',''],['6','Heartless',''],['7','Faith',''],['8','Cry for Me',''],['—',"I Can't F**king Sing",'Interlude'],['9','São Paulo','w/ Anitta'],['10','Take My Breath',''],['11','Sacrifice',''],['12','How Do I Make You Love Me?',''],['—',"A Cruel Angel's Thesis",'Interlude cover'],['13',"Can't Feel My Face",''],['14','Lost in the Fire',''],['15','Timeless','w/ Anitta'],['16','Often',''],['17','Given Up on Me',''],['18','I Was Never There',''],['19','The Hills',''],['20','Creepin',''],['21','Niagara Falls',''],['22','One of the Girls',''],['23','Out of Time',''],['24','I Feel It Coming',''],['25','Die for You',''],['26','Is There Someone Else?',''],['27','Wicked Games',''],['28','Call Out My Name',''],['29','The Morning',''],['30','Save Your Tears',''],['31','Less Than Zero',''],['32','Blinding Lights','']];
const sl_rio26 = [['1','Baptized in Fear',''],['2','Open Hearts',''],['3','Wake Me Up',''],['4','After Hours',''],['★','Rio','⭐ WORLD DEBUT w/ Anitta'],['5','São Paulo',''],['6','Take My Breath',''],['—',"A Cruel Angel's Thesis",'Interlude'],['7','Blinding Lights','']];

const shows = [
    {date:'2022-07-14',city:'Philadelphia',venue:'Lincoln Financial Field',region:'usa',leg:'2022 — North America'},
    {date:'2022-09-03',city:'Inglewood',venue:'SoFi Stadium',region:'usa',leg:'2022 — North America'},
    {date:'2023-09-26',city:'Monterrey',venue:'Estadio BBVA',region:'latam',leg:'2023 — Latin America'},
    {date:'2023-09-29',city:'Mexico City',venue:'Foro Sol',region:'latam',leg:'2023 — Latin America'},
    {date:'2026-04-20',city:'Mexico City',venue:'Estadio GNP Seguros',region:'latam',leg:'2026 — Latin America'},
    {date:'2026-04-26',city:'Rio de Janeiro',venue:'Estádio Nilton Santos',region:'latam',leg:'2026 — Latin America'}
];

function getSt(d){ const diff = Math.round((new Date(d+'T12:00:00')-TODAY)/86400000); return diff < 0 ? 'past' : diff === 0 ? 'live' : diff <= 30 ? 'soon' : 'up'; }
function renderStats(){ document.getElementById('stats').innerHTML = `<div class="stat-card"><span class="stat-val">${shows.length}</span><span class="stat-lab">Total</span></div><div class="stat-card"><span class="stat-val">${shows.filter(s=>getSt(s.date)==='past').length}</span><span class="stat-lab">Done</span></div><div class="stat-card"><span class="stat-val">${shows.filter(s=>getSt(s.date)!=='past').length}</span><span class="stat-lab">Upcoming</span></div><div class="stat-card"><span class="stat-val">24</span><span class="stat-lab">Countries</span></div>`; }
function filterShows(f, b){ filter = f; document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); render(); }
function render(){
    let html = ''; let currentLeg = '';
    shows.forEach((s, idx) => {
        if(s.leg !== currentLeg) { currentLeg = s.leg; html += `<div class="year-header">${currentLeg}</div>`; }
        const st = getSt(s.date); const d = new Date(s.date+'T12:00:00');
        html += `<div class="show-row" onclick="openM('${s.date}', '${s.city}', '${s.venue}')">
            <div class="date-box"><div class="d-day">${d.getDate()}</div><div class="d-mon">${MON[d.getMonth()]}</div></div>
            <div><div class="venue-info"><span class="region-label">${s.region.toUpperCase()}</span>${s.city}</div><div class="venue-sub">${s.venue}</div></div>
            <div><span class="tag ${st==='past'?'tag-done':st==='live'?'tag-live':st==='soon'?'tag-soon':'tag-upcoming'}">${st.toUpperCase()}</span></div>
        </div>`;
    });
    document.getElementById('shows-container').innerHTML = html;
}
function openM(date, city, venue){
    document.getElementById('m-city').textContent = city;
    document.getElementById('m-date').textContent = venue;
    let list = date === '2026-04-26' ? sl_rio26 : date === '2022-09-03' ? sl_sofi_fail : date.startsWith('2026') ? sl_latam26 : date.startsWith('2023') ? sl_latam23 : sl_na22;
    let h = '';
    list.forEach(t => h += `<div class="setlist-item"><div class="track-num">${t[0]}</div><div class="track-info"><div class="track-title">${t[1]}</div><span class="track-note">${t[2]}</span></div></div>`);
    document.getElementById('m-body').innerHTML = h;
    document.getElementById('setlist-modal').classList.add('active');
}
function closeModal(e, force = false){ if(force || e.target.id === 'setlist-modal') document.getElementById('setlist-modal').classList.remove('active'); }
function switchTab(tab, btn){ document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active')); btn.classList.add('active'); document.getElementById('tab-' + tab).classList.add('active'); }
renderStats(); render();
</script>
</body>
</html>
